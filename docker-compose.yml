services:
  sql-database:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=test_db
      - MYSQL_ROOT_PASSWORD=root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  njs-backend:
    build: ./back
    ports:
      - "3333:3333"
    depends_on:
      sql-database:
        condition: service_healthy
    environment:
      DATABASE_HOST: sql-database

  rjs-frontend:
    build: ./front
    ports:
      - "8888:8888"
    depends_on:
      - njs-backend
    environment:
      VITE_API_URL: http://localhost:3333
